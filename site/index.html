// ===== Story book (LOCAL ONLY) =====================================
// The full Main-Story screenplay: a chapter table-of-contents (#/story) and an
// illustrated reader (#/story/<chapterId>) with an EN/KR/JA dialogue toggle and
// a per-chapter "Voices" panel reusing the voice-clip machinery. All data is
// gitignored + held aside on deploy, so none of this ships publicly.
// Short labels for the dialogue-text languages (the data carries up to 10).
const STORY_TEXT_LABELS = { en:"EN", kr:"KR", ja:"JA", zht:"繁", zhs:"简",
  de:"DE", fr:"FR", es:"ES", pt:"PT", th:"TH" };
const STORY_VOICE_LANGS = [["en","EN"],["ja","JA"],["ko","KR"]];   // extracted voice langs

function injectStoryNav() {
  if (document.querySelector('nav button[data-v="story"]')) return;
  const nav = document.querySelector("header nav");
  if (!nav) return;
  const btn = document.createElement("button");
  btn.dataset.v = "story"; btn.textContent = "Story";
  btn.onclick = () => { location.hash = "#/story"; };
  const about = nav.querySelector('button[data-v="about"]');
  nav.insertBefore(btn, about);
}

function story() {
  setNav("story");
  const eps = (STORY_INDEX && STORY_INDEX.episodes) || [];
  if (!eps.length) { $("#app").innerHTML = `<p class="empty">No story indexed.</p>`; return; }
  const total = eps.reduce((n,e) => n + e.chapters.length, 0);
  $("#app").innerHTML = `
    <p class="section-label first">Main Story · ${total} chapters</p>
    <div class="story-toc">
      ${eps.map(e => `
        <section class="story-ep">
          <h2 class="story-ep-h">${escapeHtml(e.label)}</h2>
          <div class="story-chaps">
            ${e.chapters.map(c => `
              <a class="story-chap" href="#/story/${encodeURIComponent(c.id)}">
                ${c.bg ? `<span class="story-chap-bg" style="background-image:url('${c.bg}')"></span>`
                       : `<span class="story-chap-bg story-chap-bg-blank"></span>`}
                <span class="story-chap-meta">
                  <span class="story-chap-t">${escapeHtml(c.label)}</span>
                  <span class="story-chap-n">${c.beats} lines</span>
                </span>
              </a>`).join("")}
          </div>
        </section>`).join("")}
    </div>`;
}

function storyFlat() {
  const flat = [];
  for (const e of (STORY_INDEX && STORY_INDEX.episodes) || [])
    for (const c of e.chapters) flat.push({ ...c, ep: e.label });
  return flat;
}

async function storyChapter(cid) {
  setNav("story");
  const flat = storyFlat();
  const idx = flat.findIndex(c => c.id === cid);
  if (idx < 0) { $("#app").innerHTML = `<p class="empty">Chapter not found.</p>`; return; }
  $("#app").innerHTML = `<p class="empty">Loading…</p>`;
  let beats;
  try {
    beats = STORY_CHAPTERS[cid] ||
      (STORY_CHAPTERS[cid] = await (await fetch(`data/story/${encodeURIComponent(cid)}.json`)).json());
  } catch { $("#app").innerHTML = `<p class="empty">Chapter failed to load.</p>`; return; }
  renderStoryChapter(cid, flat[idx], flat, idx, beats);
}

// Resolve a story-voice clip URL for the selected voice language (with fallback).
function storyVoiceUrl(vkey) {
  const langs = (VOICE_STORY && VOICE_STORY[vkey]) || [];
  if (!langs.length) return null;
  const lang = langs.includes(storyVoiceLang) ? storyVoiceLang : langs[0];
  return `${VOICE_BASE}/story/${lang}/${vkey}.ogg`;
}
function playStoryVoice(vkey) {
  const url = storyVoiceUrl(vkey);
  if (!url) return;
  if (!storyAudio) storyAudio = new Audio();
  try { storyAudio.pause(); } catch {}
  storyAudio.src = url;
  storyAudio.play().catch(() => {});
}
const isVoiced = (b) => b.v && VOICE_STORY && VOICE_STORY[b.v];

function beatHtml(b, L, fi) {
  if (b.t === "scene") {
    return b.bg
      ? `<a class="scene-divider" data-zoom href="${b.bg}" data-cap="${escapeHtml(b.raw||'')}"><img src="${b.bg}" alt="" loading="lazy"></a>`
      : `<div class="scene-divider scene-blank">· · ·</div>`;
  }
  const txt = escapeHtml((b.text && (b.text[L] || b.text.en || b.text.kr)) || "");
  const vbtn = isVoiced(b) ? `<button class="beat-voice" data-v="${b.v}" title="play voice">▶</button>` : "";
  // "Play in Theater from here" — fi is this beat's frame index.
  const tbtn = fi != null ? `<button class="beat-fromhere" data-fi="${fi}" title="Play in Theater from here">⛶</button>` : "";
  if (b.t === "title") return `<div class="beat-title">${txt}${tbtn}</div>`;
  if (b.t === "narr")  return `<div class="beat-narr">${vbtn}${txt}${tbtn}</div>`;
  const port = b.portrait
    ? `<a class="beat-portrait" data-zoom href="${b.portrait}" data-cap="${escapeHtml(b.name||'')}"><img src="${b.portrait}" alt="" loading="lazy"></a>`
    : `<span class="beat-portrait beat-portrait-blank">${escapeHtml((b.name||'?').slice(0,1))}</span>`;
  const nm = b.slug
    ? `<a class="beat-name" href="#/u/${encodeURIComponent(b.slug)}">${escapeHtml(b.name)}</a>`
    : `<span class="beat-name">${escapeHtml(b.name)}</span>`;
  return `<div class="beat-line${b.choice?' beat-choice':''}">${port}
    <div class="beat-text"><div class="beat-spk">${nm}${vbtn}${tbtn}</div><div class="beat-say">${txt}</div></div></div>`;
}

// Render a chapter's beats to HTML, tagging each displayable beat with its theater
// frame index (frames skip `scene` beats, matching buildFrames()).
function storyBodyHtml(beats, L) {
  let fi = 0;
  return beats.map(b => b.t === "scene" ? beatHtml(b, L, null) : beatHtml(b, L, fi++)).join("");
}

// ----- Theater (visual-novel) mode -----
// Walks the chapter's beats into VN "frames" (each line/narr/title carries the
// latest scene background) and shows one at a time over a dimmed bg, with the
// text in a translucent box. Click / → / Space advance; ← back; Esc closes.
function buildFrames(beats) {
  // Seed with the chapter's first background so opening frames aren't a blank screen.
  let bg = (beats.find(b => b.t === "scene" && b.bg) || {}).bg || null;
  const fr = [];
  for (const b of beats) {
    if (b.t === "scene") { bg = b.bg || bg; continue; }
    fr.push({ bg, kind: b.t, name: b.name || null, portrait: b.portrait || null,
              text: b.text, v: b.v || null });
  }
  return fr;
}
function openTheater(frames, i) {
  if (!frames.length) return;
  THEATER = { frames, i: i || 0 };
  let el = document.getElementById("theater");
  if (!el) { el = document.createElement("div"); el.id = "theater"; el.className = "theater"; document.body.appendChild(el); }
  el.classList.add("open");
  el.onclick = (e) => { if (!e.target.closest(".th-close, .th-bar, .beat-voice")) theaterStep(1); };
  theaterRender();
}
function theaterRender() {
  if (!THEATER) return;
  const { frames, i } = THEATER, f = frames[i], L = storyLang;
  const txt = escapeHtml((f.text && (f.text[L] || f.text.en || f.text.kr)) || "");
  const voiced = f.v && VOICE_STORY && VOICE_STORY[f.v];
  const el = document.getElementById("theater");
  el.innerHTML = `
    <div class="th-bg" style="${f.bg ? `background-image:url('${f.bg}')` : ""}"></div>
    <div class="th-bar">
      <span class="th-prog">${i+1} / ${frames.length}</span>
      <button class="th-close" id="thClose" title="exit (Esc)">✕</button>
    </div>
    ${f.portrait ? `<img class="th-portrait" src="${f.portrait}" alt="">` : ""}
    <div class="th-box${f.kind!=='line'?' th-center':''}">
      ${f.name ? `<div class="th-name">${escapeHtml(f.name)}${voiced?` <button class="beat-voice th-replay" data-v="${f.v}" title="replay">▶</button>`:""}</div>` : ""}
      <div class="th-text">${txt}</div>
    </div>
    <div class="th-hint">click / → next · ← back · Esc exit</div>`;
  document.getElementById("thClose").onclick = (e) => { e.stopPropagation(); closeTheater(); };
  if (voiced) playStoryVoice(f.v);
}
function theaterStep(d) {
  if (!THEATER) return;
  const n = THEATER.i + d;
  if (n < 0) return;
  if (n >= THEATER.frames.length) { closeTheater(); return; }
  THEATER.i = n; theaterRender();
}
function closeTheater() {
  const el = document.getElementById("theater");
  if (el) el.classList.remove("open");
  if (storyAudio) { try { storyAudio.pause(); } catch {} }
  THEATER = null;
}

function renderStoryChapter(cid, meta, flat, idx, beats) {
  STORY_FRAMES = buildFrames(beats);
  const langs = (STORY_INDEX && STORY_INDEX.langs) || ["en", "kr", "ja"];
  if (!langs.includes(storyLang)) storyLang = langs[0];
  const textBtns = langs.map(k =>
    `<button class="slang${k===storyLang?' on':''}" data-lang="${k}">${STORY_TEXT_LABELS[k]||k.toUpperCase()}</button>`).join("");
  const voicedN = beats.filter(isVoiced).length;
  const voiceBtns = STORY_VOICE_LANGS.map(([k,lab]) =>
    `<button class="svlang${k===storyVoiceLang?' on':''}" data-lang="${k}">${lab}</button>`).join("");
  const prev = idx > 0 ? flat[idx-1] : null, next = idx < flat.length-1 ? flat[idx+1] : null;
  $("#app").innerHTML = `
    <div class="story-reader">
      <div class="story-rhead">
        <a class="story-back" href="#/story">← All chapters</a>
        <div class="story-title"><span class="story-ep-tag">${escapeHtml(meta.ep)}</span><h2>${escapeHtml(meta.label)}</h2></div>
        <button class="story-theater-btn" id="thStart">▶ Theater</button>
      </div>
      <div class="story-langbar">
        <span class="story-lang-grp"><span class="story-lang-lbl">Text</span><span class="slang-row">${textBtns}</span></span>
        ${voicedN ? `<span class="story-lang-grp"><span class="story-lang-lbl">Voice</span><span class="slang-row">${voiceBtns}</span></span>` : ""}
      </div>
      ${voicedN ? `<p class="story-voiced-note">${voicedN} voiced lines — ▶ plays the line · ⛶ starts Theater there</p>` : ""}
      <div class="story-body" id="storyBody">${storyBodyHtml(beats, storyLang)}</div>
      <div class="story-nav">
        ${prev ? `<a href="#/story/${encodeURIComponent(prev.id)}">← ${escapeHtml(prev.label)}</a>` : `<span></span>`}
        ${next ? `<a href="#/story/${encodeURIComponent(next.id)}">${escapeHtml(next.label)} →</a>` : `<span></span>`}
      </div>
    </div>`;
  window.scrollTo(0, 0);
  // Text language: re-render the body in the chosen language.
  document.querySelectorAll(".slang").forEach(btn => btn.onclick = () => {
    storyLang = btn.dataset.lang;
    document.querySelectorAll(".slang").forEach(b => b.classList.toggle("on", b === btn));
    document.getElementById("storyBody").innerHTML = storyBodyHtml(beats, storyLang);
  });
  // Voice language: independent of text (just re-style; next play uses it).
  document.querySelectorAll(".svlang").forEach(btn => btn.onclick = () => {
    storyVoiceLang = btn.dataset.lang;
    document.querySelectorAll(".svlang").forEach(b => b.classList.toggle("on", b === btn));
  });
  document.getElementById("thStart").onclick = () => openTheater(STORY_FRAMES, 0);
}

function route() {
  const h = location.hash;
  const isHub = !(h.startsWith("#/u/") || h.startsWith("#/story") || h === "#/updates" || h === "#/emotes" || h === "#/wallpapers" || h === "#/artifacts" || h === "#/about");
  // Release IntersectionObserver references to the previous hub render before
  // any view swaps in — otherwise the detached <img> nodes stay pinned.
  if (!isHub && _hubImgObs) { _hubImgObs.disconnect(); _hubImgObs = null; }
  if (h.startsWith("#/u/")) {
    const rest = decodeURIComponent(h.slice(4));
    const [base, vsuf] = rest.split("/");
    detail(base, vsuf || "");
  } else if (h.startsWith("#/story/")) storyChapter(decodeURIComponent(h.slice(8)));
  else   if (h === "#/story")       story();
  else   if (h === "#/updates")    updates();
  else   if (h === "#/emotes")     emotes();
  else   if (h === "#/wallpapers") wallpapers();
  else   if (h === "#/artifacts")  artifacts();
  else   if (h === "#/about")      about();
  else                              hub();
}

window.addEventListener("hashchange", route);
document.querySelectorAll("nav button").forEach(b =>
  b.onclick = () => {
    const v = b.dataset.v;
    location.hash = v === "hub" ? "#/" : "#/" + v;
  }
);

// Global lightbox: any <a data-zoom href="..."> opens the asset full-size in
// the modal instead of navigating. We use delegation so it picks up links
// rendered after page-load (gallery, emotes, wallpapers, …) without needing
// per-route wiring. Right-click / middle-click still hit the link's href so
// "open in new tab" keeps working.
const LB        = document.getElementById("lightbox");
const LB_IMG    = document.getElementById("lbImage");
const LB_AUDIO  = document.getElementById("lbAudio");
const LB_VIDEO  = document.getElementById("lbVideo");
const LB_DL     = document.getElementById("lbDownload");
const LB_CAP    = document.getElementById("lbCaption");
function openLightbox(src, caption) {
  LB.classList.remove("audio", "video");
  LB_AUDIO.pause(); LB_AUDIO.removeAttribute("src");
  LB_VIDEO.pause(); LB_VIDEO.removeAttribute("src");
  LB_IMG.style.display = "";
  LB_IMG.src = src;
  LB_DL.href = src;
  LB_DL.download = decodeURIComponent(src.split("/").pop() || "asset");
  LB_CAP.textContent = caption || "";
  LB.classList.add("open");
  LB.setAttribute("aria-hidden", "false");
}
function openLightboxAudio(src, caption) {
  LB.classList.add("audio"); LB.classList.remove("video");
  LB_IMG.style.display = "none"; LB_IMG.src = "";
  LB_VIDEO.pause(); LB_VIDEO.removeAttribute("src");
  LB_AUDIO.src = src;
  LB_DL.href = src;
  LB_DL.download = decodeURIComponent(src.split("/").pop() || "clip") ;
  LB_CAP.textContent = caption || "";
  LB.classList.add("open");
  LB.setAttribute("aria-hidden", "false");
  LB_AUDIO.play().catch(() => {}); // autoplay; ignore if blocked
}
function openLightboxVideo(src, caption) {
  LB.classList.add("video"); LB.classList.remove("audio");
  LB_IMG.style.display = "none"; LB_IMG.src = "";
  LB_AUDIO.pause(); LB_AUDIO.removeAttribute("src");
  LB_VIDEO.src = src;
  LB_DL.href = src;
  LB_DL.download = decodeURIComponent(src.split("/").pop() || "illustration");
  LB_CAP.textContent = caption || "";
  LB.classList.add("open");
  LB.setAttribute("aria-hidden", "false");
  LB_VIDEO.play().catch(() => {}); // autoplay; ignore if blocked
}
function closeLightbox() {
  LB.classList.remove("open", "audio", "video");
  LB.setAttribute("aria-hidden", "true");
  LB_IMG.src = "";
  LB_AUDIO.pause(); LB_AUDIO.removeAttribute("src");
  LB_VIDEO.pause(); LB_VIDEO.removeAttribute("src");
}
document.addEventListener("click", (e) => {
  // Modifier-click / non-primary buttons preserve the native link behaviour.
  if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return;
  // Inline story-voice play button (reader + theater replay).
  const bvBtn = e.target.closest(".beat-voice");
  if (bvBtn) { e.preventDefault(); e.stopPropagation(); playStoryVoice(bvBtn.dataset.v); return; }
  // "Play in Theater from here" button.
  const fhBtn = e.target.closest(".beat-fromhere");
  if (fhBtn) { e.preventDefault(); openTheater(STORY_FRAMES, +fhBtn.dataset.fi); return; }
  // Voice-line clip → audio lightbox.
  const clip = e.target.closest(".vlclip");
  if (clip) {
    const { slug, action, take, label } = clip.dataset;
    const url = `${VOICE_BASE}/${voiceLang}/voc_${slug}_${action}_${take}.ogg`;
    const langLab = (AUDIO_LANGS.find(([k]) => k === voiceLang) || ["", voiceLang])[1];
    openLightboxAudio(url, `${label}${+take > 1 ? " (" + take + ")" : ""} · ${langLab}`);
    return;
  }
  // Voice language toggle → re-render the clip rows for the chosen language.
  const lang = e.target.closest(".vlang");
  if (lang) {
    voiceLang = lang.dataset.lang;
    lang.parentElement.querySelectorAll(".vlang").forEach(b =>
      b.classList.toggle("on", b === lang));
    const box = document.getElementById("voiceClips");
    if (box) {
      const slug = box.dataset.clipslug;
      box.innerHTML = renderVoiceClips(slug, VOICE_CLIPS[slug], voiceLang);
    }
    return;
  }
  // Inline intimacy illustration video → enlarge in the video lightbox.
  const iv = e.target.closest(".intimacy-vid");
  if (iv) { e.preventDefault(); openLightboxVideo(iv.getAttribute("src"), iv.dataset.cap || ""); return; }
  // Intimacy reaction thumbnail → play the clip in the video lightbox.
  const ir = e.target.closest(".intim-react");
  if (ir) { e.preventDefault(); openLightboxVideo(ir.dataset.reactSrc, ir.dataset.cap || ""); return; }
  const a = e.target.closest("a[data-zoom]");
  if (!a) return;
  e.preventDefault();
  openLightbox(a.getAttribute("href"), a.dataset.cap || "");
});
LB.addEventListener("click", (e) => {
  // Clicks on backdrop close; clicks on the image / audio / video / download / close don't.
  if (e.target === LB_IMG || e.target === LB_AUDIO || e.target === LB_VIDEO ||
      e.target.closest(".lb-download") || e.target.closest(".lb-audio") ||
      e.target.closest(".lb-video")) return;
  closeLightbox();
});
// Force a real download (not open-in-tab) for any lightbox asset. The native
// `download` attr is ignored cross-origin (e.g. audio/textures on R2), so fetch
// the bytes as a blob and save those. R2 CORS allows GET from the site origin;
// same-origin Pages assets (skill webp, pose, face art) need no CORS. Falls back
// to opening the URL if the fetch is blocked.
document.getElementById("lbDownload").addEventListener("click", async (e) => {
  const src = LB_DL.href;
  if (!src) return;
  e.preventDefault();
  const name = LB_DL.getAttribute("download") || "download";
  try {
    const resp = await fetch(src);
    if (!resp.ok) throw new Error(resp.status);
    const url = URL.createObjectURL(await resp.blob());
    const a = document.createElement("a");
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  } catch (_) {
    window.open(src, "_blank", "noopener");
  }
});
document.getElementById("lbClose").addEventListener("click", closeLightbox);
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && LB.classList.contains("open")) closeLightbox();
});
// Theater (VN) mode keyboard nav.
document.addEventListener("keydown", (e) => {
  if (!THEATER) return;
  if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); theaterStep(1); }
  else if (e.key === "ArrowLeft") { e.preventDefault(); theaterStep(-1); }
  else if (e.key === "Escape") { e.preventDefault(); closeTheater(); }
});

load();
</script>
</body>
