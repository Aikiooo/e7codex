<!-- E7's .scsp is a custom container around LZ4-compressed Spine 3.8.99 (newer rigs)
     or 2.1.27 (older rigs) binary, with the texture as a separate .sct (also LZ4 +
     RGB565/ASTC). We bake static PNG poses ahead of time via tools/ and a deploy-
     friendly live viewer at viewer.html?slug=<id> uses spine-player on the same
     converted assets in assets/<id>/. Names + ceciliabot kebab slugs come from
     two community-maintained JSONs that build_index.py merges into units.json. -->
<style>
  :root{--ink:#0c0d12;--ink-2:#13141d;--panel:#171826;--line:#2a2c3f;
    --gold:#d8b06a;--gold-dim:#9a824e;--teal:#6fd6c4;--text:#e7e5dd;
    --mut:#8d8c9c;--rose:#d98aa0;
    --fire:#e07a5a;--ice:#7ac0d8;--wind:#86c97a;--light:#e8d27a;--dark:#b07ad8}
  /* Stepped page zoom for wide displays. Lightbox sits outside <main>
     so it stays at 1× — full-size assets open at native resolution.
     Stepped instead of clamp()/calc() because Firefox's `zoom` parser
     rejects dynamic values; Chromium accepts both. */
  @media (min-width:1700px){header,main{zoom:1.10}}
  @media (min-width:2000px){header,main{zoom:1.20}}
  @media (min-width:2300px){header,main{zoom:1.30}}
  @media (min-width:2800px){header,main{zoom:1.40}}
  @media (min-width:3300px){header,main{zoom:1.50}}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(900px 600px at 80% -10%,rgba(216,176,106,.08),transparent 60%),radial-gradient(700px 500px at 0% 100%,rgba(111,214,196,.06),transparent 55%),var(--ink);color:var(--text);font-family:'Outfit',sans-serif;line-height:1.5;min-height:100vh}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--gold);color:var(--ink)}
  header{padding:34px 40px 22px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:26px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(23,24,38,.6),transparent)}
  .brand{font-family:'Cormorant Garamond',serif;font-size:34px;letter-spacing:.04em;color:var(--gold);font-weight:600;cursor:pointer;transition:.2s}
  .brand:hover{color:var(--text)}
  .brand small{display:block;font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.32em;color:var(--mut);text-transform:uppercase;margin-top:2px}
  nav{display:flex;gap:4px;margin-left:auto}
  nav button{background:none;border:1px solid transparent;color:var(--mut);font-family:'Spline Sans Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;padding:9px 16px;cursor:pointer;border-radius:2px;transition:.2s;flex:0 0 auto}
  nav button:hover{color:var(--text)}
  nav button.on{color:var(--gold);border-color:var(--gold-dim);background:rgba(216,176,106,.06)}
  @media(max-width:720px){
    header{padding:20px 16px 14px;gap:14px}
    nav{margin-left:0;width:100%;overflow-x:auto;overflow-y:hidden;flex-wrap:nowrap;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px;-ms-overflow-style:none}
    nav::-webkit-scrollbar{display:none}
  }
  main{max-width:1500px;margin:0 auto;padding:30px 40px 90px}
  .bar{display:flex;gap:14px;align-items:center;margin-bottom:22px;flex-wrap:wrap}
  .bar input{flex:1;min-width:220px;background:var(--ink-2);border:1px solid var(--line);color:var(--text);padding:11px 15px;border-radius:3px;font-family:'Spline Sans Mono',monospace;font-size:13px}
  .bar input:focus{outline:none;border-color:var(--gold-dim)}
  .q-wrap{flex:1;min-width:220px;position:relative;display:flex}
  .q-wrap input{min-width:0;padding-right:54px}
  .qmode{position:absolute;right:5px;top:50%;transform:translateY(-50%);background:var(--ink);border:1px solid var(--line);color:var(--mut);font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.08em;padding:4px 9px;border-radius:2px;cursor:pointer}
  .qmode:hover{color:var(--text);border-color:var(--gold-dim)}
  .qmode.on{color:var(--gold);border-color:var(--gold-dim);background:rgba(216,176,106,.07)}
  .count{font-family:'Spline Sans Mono',monospace;font-size:12px;color:var(--mut);letter-spacing:.1em}
  .kinds{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
  .kinds button{background:var(--ink-2);border:1px solid var(--line);color:var(--mut);font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.1em;padding:6px 13px;border-radius:2px;cursor:pointer;text-transform:uppercase}
  .kinds button.on{color:var(--gold);border-color:var(--gold-dim)}
  .kinds button .n{color:var(--mut);margin-left:6px;font-size:10px}
  .grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(176px,1fr))}
  @media(min-width:1100px){.grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:4px;overflow:hidden;cursor:pointer;transition:.22s;position:relative;display:block;color:inherit;text-decoration:none}
  .card:hover{border-color:var(--gold-dim);transform:translateY(-3px);box-shadow:0 14px 30px -18px rgba(0,0,0,.9)}
  .thumb{aspect-ratio:3/4;background:linear-gradient(135deg,#1c1d2b,#101019);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  .thumb img{width:100%;height:100%;object-fit:contain;padding:6px}
  .variant-badge{position:absolute;top:8px;right:8px;background:rgba(216,176,106,.18);color:var(--gold);font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.1em;padding:3px 7px;border-radius:2px;border:1px solid var(--gold-dim);text-transform:uppercase}
  .new-badge{position:absolute;top:8px;left:8px;z-index:3;background:linear-gradient(95deg,#e6b86e,#f3d79a);color:#13141d;font-family:'Spline Sans Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.12em;padding:3px 8px;border-radius:2px;text-transform:uppercase;box-shadow:0 2px 9px rgba(0,0,0,.45)}
  /* Wallpaper cells already carry a category chip at top-left — push NEW to the right. */
  .wallpaper-cell .new-badge{left:auto;right:6px;top:6px}
  /* Emote rows aren't positioned cards — render NEW as an inline chip by the name. */
  .new-badge.inline{position:static;display:inline-block;margin-left:8px;vertical-align:middle;box-shadow:none}
  .form-swap{position:absolute;left:6px;right:6px;bottom:6px;display:flex;gap:3px;justify-content:center;flex-wrap:wrap;opacity:1;transition:opacity .18s;pointer-events:auto}
  /* Devices that support real hover get a clean thumb until the user
     hovers; touch devices keep the pills visible so they're discoverable. */
  @media (hover: hover){
    .form-swap{opacity:0;pointer-events:none}
    .card:hover .form-swap,.form-swap:focus-within{opacity:1;pointer-events:auto}
  }
  .form-swap button{background:rgba(13,14,22,.82);border:1px solid var(--line);color:var(--mut);font-family:'Spline Sans Mono',monospace;font-size:9px;letter-spacing:.06em;padding:2px 6px;border-radius:2px;cursor:pointer;text-transform:uppercase;backdrop-filter:blur(2px)}
  .form-swap button:hover{color:var(--text);border-color:var(--gold-dim)}
  .form-swap button.on{color:var(--gold);border-color:var(--gold-dim);background:rgba(216,176,106,.14)}
  .meta{padding:11px 13px}
  .meta .name{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--text);line-height:1.18;word-break:break-word}
  .meta .id{font-family:'Spline Sans Mono',monospace;font-size:11px;color:var(--mut);margin-top:3px;letter-spacing:.05em}
  .meta .sub{font-size:11px;color:var(--mut);margin-top:7px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .tag{font-family:'Spline Sans Mono',monospace;font-size:10px;padding:1px 7px;border-radius:2px;letter-spacing:.04em}
  .tag.spine{color:var(--teal);border:1px solid rgba(111,214,196,.3)}
  .tag.art{color:var(--gold);border:1px solid rgba(216,176,106,.3)}
  .tag.skill{color:var(--rose);border:1px solid rgba(217,138,160,.3)}
  .tag.upd{color:var(--rose);border:1px solid rgba(217,138,160,.3)}
  .attr{font-family:'Spline Sans Mono',monospace;font-size:9px;padding:1px 6px;border-radius:9px;letter-spacing:.08em;text-transform:uppercase}
  .attr.fire{color:var(--fire);border:1px solid rgba(224,122,90,.35)}
  .attr.ice{color:var(--ice);border:1px solid rgba(122,192,216,.35)}
  .attr.wind{color:var(--wind);border:1px solid rgba(134,201,122,.35)}
  .attr.light{color:var(--light);border:1px solid rgba(232,210,122,.35)}
  .attr.dark{color:var(--dark);border:1px solid rgba(176,122,216,.35)}
  .cls{font-family:'Spline Sans Mono',monospace;font-size:9px;padding:1px 6px;border-radius:2px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-dim);border:1px solid rgba(154,130,78,.35)}
  .stars{color:var(--gold);letter-spacing:-1px;font-size:11px}
  /* Two-level wrap. .filters itself wraps groups, so a narrow viewport
     breaks at a group boundary (element / class / rarity) before it
     wraps a chip mid-group. .fgroup is the inner flex container that
     holds each label + its chips and only wraps within if even the group
     can't fit on one line. */
  .filters{display:flex;gap:6px 14px;flex-wrap:wrap;align-items:center;margin:-12px 0 24px}
  .filters .fgroup{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .filters .flabel{font-family:'Spline Sans Mono',monospace;font-size:10px;color:var(--mut);letter-spacing:.12em;text-transform:uppercase;margin-right:2px}
  .filters .chip{background:var(--ink-2);border:1px solid var(--line);color:var(--mut);font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.1em;padding:5px 11px;border-radius:2px;cursor:pointer;text-transform:uppercase}
  .filters .chip:hover{color:var(--text);border-color:var(--gold-dim)}
  .filters .chip.on{color:var(--gold);border-color:var(--gold-dim);background:rgba(216,176,106,.07)}
  .filters .chip.el-fire.on{color:var(--fire);border-color:rgba(224,122,90,.55)}
  .filters .chip.el-ice.on{color:var(--ice);border-color:rgba(122,192,216,.55)}
  .filters .chip.el-wind.on{color:var(--wind);border-color:rgba(134,201,122,.55)}
  .filters .chip.el-light.on{color:var(--light);border-color:rgba(232,210,122,.55)}
  .filters .chip.el-dark.on{color:var(--dark);border-color:rgba(176,122,216,.55)}
  .filters .chip.rar{letter-spacing:-1px;font-size:13px;padding:3px 11px}
  .filters .chip.clear{color:var(--mut);font-size:10px}
  .updates-list{display:grid;gap:32px}
  .upd-row{background:var(--panel);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .upd-head{display:flex;align-items:baseline;gap:18px;padding:18px 24px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .upd-head h3{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--gold);font-weight:600}
  .upd-head .code{font-family:'Spline Sans Mono',monospace;font-size:12px;color:var(--mut);letter-spacing:.14em;text-transform:uppercase}
  .upd-head .count{margin-left:auto}
  .upd-banners{display:grid;gap:0;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
  .upd-banners a{display:block;background:var(--ink-2);overflow:hidden;border:1px solid transparent}
  .upd-banners a:hover{border-color:var(--gold-dim)}
  .upd-banners img{width:100%;display:block;object-fit:cover}
  .upd-story{display:grid;gap:0;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));border-top:1px solid var(--line)}
  .upd-story a{display:block;background:var(--ink-2);overflow:hidden;border:1px solid transparent}
  .upd-story a:hover{border-color:var(--gold-dim)}
  .upd-story img{width:100%;display:block;object-fit:cover}
  .patches{display:grid;gap:20px;margin-bottom:36px}
  .patch{background:var(--panel);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .patch-head{display:flex;align-items:baseline;gap:16px;padding:16px 22px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .patch-head h3{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--gold);font-weight:600}
  .patch-head .code{font-family:'Spline Sans Mono',monospace;font-size:11px;color:var(--mut);letter-spacing:.12em;text-transform:uppercase}
  .patch-head .count{margin-left:auto;color:var(--gold-dim)}
  .patch-note{margin:0 0 14px;font-size:12px;line-height:1.5;color:var(--mut);font-style:italic;max-width:70ch}
  .patch-thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:10px;padding:18px 22px}
  .patch-thumbs .pt{position:relative;display:block;background:var(--ink-2);border:1px solid var(--line);border-radius:4px;overflow:hidden;text-decoration:none;transition:.18s}
  .patch-thumbs .pt:hover{border-color:var(--gold-dim)}
  .patch-thumbs .pt img{width:100%;height:130px;object-fit:contain;display:block;background:var(--ink-2)}
  .patch-thumbs .pt-name{display:block;font-family:'Spline Sans Mono',monospace;font-size:9px;color:var(--mut);letter-spacing:.04em;padding:4px 5px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pt-badge{position:absolute;top:5px;left:5px;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Spline Sans Mono',monospace;font-size:12px;font-weight:700;line-height:1;color:var(--ink)}
  .pt-added{background:#7fc99a}.pt-removed{background:var(--rose)}.pt-changed{background:var(--gold)}
  .patch-raw{border-top:1px solid var(--line)}
  .patch-raw summary{cursor:pointer;padding:12px 22px;font-family:'Spline Sans Mono',monospace;font-size:11px;color:var(--mut);letter-spacing:.1em;text-transform:uppercase;user-select:none}
  .patch-raw summary:hover{color:var(--gold-dim)}
  .patch-group{padding:6px 22px 14px}
  .pg-label{display:block;font-family:'Spline Sans Mono',monospace;font-size:10px;color:var(--gold-dim);letter-spacing:.14em;text-transform:uppercase;margin:10px 0 7px}
  .pg-label .pg-n{color:var(--mut);margin-left:4px}
  .pg-items{display:grid;gap:3px}
  .pe{font-family:'Spline Sans Mono',monospace;font-size:12px;color:var(--text);display:flex;align-items:baseline;gap:7px;flex-wrap:wrap}
  .pe code{font-size:11px;color:var(--mut)}
  .pe-sym{font-weight:700;width:11px;flex:0 0 auto;text-align:center}
  .pe-added .pe-sym{color:#7fc99a}.pe-removed .pe-sym{color:var(--rose)}.pe-changed .pe-sym{color:var(--gold)}
  .pe-size{font-size:10px;color:var(--mut)}
  .emote-list{display:grid;gap:14px}
  .emote-row{background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:14px 18px;display:grid;grid-template-columns:minmax(160px,200px) 1fr;gap:18px;align-items:center}
  @media(max-width:640px){.emote-row{grid-template-columns:1fr;gap:10px}}
  .emote-row.link{cursor:pointer;transition:.2s}
  .emote-row.link:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
  .emote-who .who-name{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--text);line-height:1.1}
  .emote-who .who-id{font-family:'Spline Sans Mono',monospace;font-size:11px;color:var(--mut);margin-top:3px;letter-spacing:.06em}
  .emote-who .who-count{font-family:'Spline Sans Mono',monospace;font-size:10px;color:var(--gold-dim);letter-spacing:.1em;text-transform:uppercase;margin-top:6px}
  .emote-grid{display:flex;flex-wrap:wrap;gap:10px}
  .emote-cell{position:relative;width:78px;height:78px;background:var(--ink-2);border:1px solid var(--line);border-radius:4px;overflow:hidden;display:flex;align-items:center;justify-content:center;text-decoration:none;color:inherit;transition:.15s}
  .emote-cell:hover{border-color:var(--gold-dim);transform:scale(1.04)}
  .emote-cell img{width:100%;height:100%;object-fit:contain;padding:4px}
  .emote-cell .theme{position:absolute;bottom:0;left:0;right:0;font-family:'Spline Sans Mono',monospace;font-size:8px;color:var(--mut);text-align:center;background:rgba(13,14,22,.78);padding:1px 2px;letter-spacing:.04em;text-transform:lowercase;line-height:1.2}
  .emote-cell.animated{border-color:rgba(216,176,106,.35)}
  .wallpaper-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
  .wallpaper-cell{position:relative;border:1px solid var(--line);border-radius:5px;overflow:hidden;background:var(--ink-2);transition:.2s;cursor:pointer;aspect-ratio:16/9}
  .wallpaper-cell:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
  .wallpaper-cell img{width:100%;height:100%;display:block;object-fit:cover}
  .wallpaper-cell .wp-name{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(0deg,rgba(13,14,22,.92) 10%,transparent 90%);padding:14px 14px 8px;font-family:'Spline Sans Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase}
  .wallpaper-cell .wp-cat{position:absolute;top:6px;left:6px;background:rgba(13,14,22,.78);color:var(--mut);font-family:'Spline Sans Mono',monospace;font-size:9px;padding:2px 6px;border-radius:2px;letter-spacing:.1em;text-transform:uppercase}
  .artifact-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
  .artifact-cell{position:relative;border:1px solid var(--line);border-radius:5px;overflow:hidden;background:var(--ink-2);transition:.2s;cursor:pointer;aspect-ratio:378/598;display:block}
  .artifact-cell:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
  .artifact-cell img{width:100%;height:100%;display:block;object-fit:cover;transition:.25s}
  .artifact-cell:hover img{transform:scale(1.03)}
  .artifact-cell .a-name{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(0deg,rgba(13,14,22,.96) 25%,rgba(13,14,22,.4) 75%,transparent 100%);padding:22px 11px 9px;font-family:'Spline Sans Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:.06em;text-transform:uppercase;line-height:1.25}
  .artifact-cell .a-meta{display:block;font-size:9px;color:var(--mut);letter-spacing:.08em;margin-top:3px;text-transform:capitalize}
  .artifact-cell .a-cb{position:absolute;bottom:8px;right:8px;background:rgba(13,14,22,.82);color:var(--mut);font-family:'Spline Sans Mono',monospace;font-size:9px;padding:3px 8px;border-radius:2px;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;border:1px solid var(--line);backdrop-filter:blur(2px);z-index:2;opacity:1;transition:opacity .18s,color .18s,border-color .18s;white-space:nowrap;cursor:pointer}
  .artifact-cell .a-cb:hover{color:var(--gold);border-color:var(--gold-dim)}
  /* Touch devices keep the pill visible (no hover); hover-capable devices
     hide it until the card is hovered. Mirrors .form-swap on unit cards. */
  @media (hover: hover){
    .artifact-cell .a-cb{opacity:0;pointer-events:none}
    .artifact-cell:hover .a-cb,.artifact-cell .a-cb:focus{opacity:1;pointer-events:auto}
  }
  .detail{display:grid;grid-template-columns:minmax(0,520px) 1fr;gap:40px}
  @media(max-width:880px){.detail{grid-template-columns:1fr}}
  .stage{background:var(--ink-2);border:1px solid var(--line);border-radius:5px;min-height:560px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .stage img{max-width:100%;max-height:78vh;display:block;object-fit:contain}
  .nopose{color:var(--mut);font-family:'Spline Sans Mono',monospace;font-size:12px;letter-spacing:.08em;text-align:center;padding:30px;line-height:1.7}
  .nopose code{background:rgba(216,176,106,.08);color:var(--gold);padding:1px 5px;border-radius:2px}
  .dt-head h2{font-family:'Cormorant Garamond',serif;font-size:46px;color:var(--text);font-weight:600;line-height:1.05;word-break:break-word}
  .dt-head .ids{font-family:'Spline Sans Mono',monospace;font-size:12px;color:var(--mut);margin:6px 0 8px;letter-spacing:.08em}

  /* Lightbox modal — intercepts clicks on a[data-zoom] anywhere on the page

<body>
<header>
  <a class="brand" href="#/" title="back to hub">E7 Codex<small>Artwork &amp; Pose Archive</small></a>
  <nav><button class="on" data-v="hub">Units</button>
       <button data-v="artifacts">Artifacts</button>
       <button data-v="updates">Updates</button>
       <button data-v="emotes">Emotes</button>
       <button data-v="wallpapers">Wallpapers</button>
       <button data-v="about">About</button></nav>
</header>
<main id="app"></main>
<div id="lightbox" class="lightbox" role="dialog" aria-hidden="true">
  <button class="lb-close" id="lbClose" aria-label="close">×</button>
  <a class="lb-download" id="lbDownload" download aria-label="download" title="download"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg></a>
  <img id="lbImage" alt="">
  <audio id="lbAudio" class="lb-audio" controls preload="auto"></audio>
  <div id="lbCaption" class="lb-caption"></div>
</div>
<script>
"use strict";
const KIND_LABELS = { unit:"Heroes", npc:"NPCs", monster:"Monsters",
                      pet:"Pets", artifact:"Artifacts", special:"Special", other:"Other" };
// Human-readable label for a variant suffix on the slug.
const VARIANT_LABELS = {
  "":      { tab:"Base",     tagline:"" },
  "s01":   { tab:"S1 Skin",  tagline:"skin variant" },
  "s02":   { tab:"S2 Skin",  tagline:"skin variant" },
  "s01_1": { tab:"S1 alt",   tagline:"skin alt" },
  "s02_1": { tab:"S2 alt",   tagline:"skin alt" },
  "m":     { tab:"ML",       tagline:"moonlight form" },
  "m2":    { tab:"ML 2",     tagline:"second moonlight form" },
  "m_s01": { tab:"ML S1",    tagline:"moonlight skin" },
  "a01":   { tab:"Alt",      tagline:"alt form" },
  "t":     { tab:"Transform",tagline:"transformation form" },
  "1":     { tab:"Alt 1",    tagline:"alt model" },
};

let UNITS = [], UPDATES = {}, EMOTES = [], WALLPAPERS = [], ARTIFACTS = [], PATCHES = [], VOICES = {}, VOICE_CLIPS = {}, BY_BASE = new Map(), demo = false;
// Voice-clip OGGs: local (same-origin site/voice/) when developing, else the R2 CDN.
const VOICE_BASE = (() => {
  const h = location.hostname;
  const local = h === "localhost" || h === "127.0.0.1" || h === "" ||
    /^192\.168\.|^10\.|^172\.(1[6-9]|2\d|3[01])\./.test(h);
  return local ? "voice" : "https://assets.e7codex.com/voice";
})();
let kindF = "all", searchQ = "", currentVariant = "", wpCatF = "all";
let artiRarityF = new Set(), artiRoleF = new Set(), artiSearchQ = "";
let elementF = new Set(), rarityF = new Set(), roleF = new Set();
// Units carry the canonical-id role values from HeroDatabase ("assassin",
// "manauser") — alias them to the user-facing names ceciliabot displays
// elsewhere on the site (thief, soul-weaver) so filters and badges read
// consistently across pages.
const UNIT_ROLE_ALIAS = { assassin: "thief", manauser: "soul-weaver" };
const ROLES = ["warrior", "knight", "ranger", "mage", "soul-weaver", "thief"];
const roleOf = (u) => UNIT_ROLE_ALIAS[u.role] || u.role || "";
// Badge text: hyphen replaced with space so CSS uppercase renders "SOUL WEAVER"
// instead of "SOUL-WEAVER". Filter chips use the same display rule.
const roleLabel = (r) => (r || "").replace("-", " ");
// Hub search keyboard mode. Android Firefox (and iOS) auto-flips the on-screen
// keyboard back to ABC after a digit on the symbol pane; inputmode + autocapitalize
// attributes don't override it. The ABC/123 toggle locks the numeric pad on
// when the user is searching by ID.
let qMode = "text";
const ELEMENTS = ["fire", "ice", "wind", "light", "dark"];
const RARITIES = [5, 4, 3];

async function load() {
  try {
    const r = await fetch("data/units.json", { cache:"no-store" });
    if (!r.ok) throw new Error("units.json missing");
    UNITS = await r.json();
    try { UPDATES    = await (await fetch("data/updates.json")).json(); }    catch { UPDATES = {}; }
    try { EMOTES     = await (await fetch("data/emotes.json")).json(); }     catch { EMOTES = []; }
    try { WALLPAPERS = await (await fetch("data/wallpapers.json")).json(); } catch { WALLPAPERS = []; }
    try { ARTIFACTS  = await (await fetch("data/artifacts.json")).json(); }  catch { ARTIFACTS = []; }
    try { PATCHES    = await (await fetch("data/patches.json")).json(); }    catch { PATCHES = []; }
    try { VOICES     = await (await fetch("data/voices.json")).json(); }     catch { VOICES = {}; }
    try { VOICE_CLIPS = await (await fetch("data/voices_audio.json")).json(); } catch { VOICE_CLIPS = {}; }
  } catch (e) {
    demo = true;
    UNITS = [
      { id:"c1019_s01", base_id:"c1019", variant:"s01", kind:"unit", name:"Ravi", slug:"ravi",
        pose:"assets/c1019_s01/pose.png", artworks:[], skills:[], spine:[{version:"3.8.99"}],
        updates:[], cecilia:"https://ceciliabot.github.io/#/hero/ravi" },
    ];
    UPDATES = {};
  }
  BY_BASE.clear();
  for (const u of UNITS) {
    const b = u.base_id || u.id;
    if (!BY_BASE.has(b)) BY_BASE.set(b, []);
    BY_BASE.get(b).push(u);
  }
  route();
}

const $ = (s) => document.querySelector(s);
const setNav = (v) => document.querySelectorAll("nav button").forEach(b => b.classList.toggle("on", b.dataset.v === v));

// Pick the canonical entry for a base_id (prefer variant="" else lexicographically first).
function representative(base) {
  const variants = BY_BASE.get(base) || [];
  return variants.find(v => !v.variant) || variants[0];
}

// Build a display name. For variants we prefix with hero_name when it differs from name.
function displayName(u) {
  if (!u) return "";
  if (u.name && u.hero_name && u.name !== u.hero_name) return `${u.hero_name} — ${u.name}`;
  return u.name || u.id;
}

function variantTab(suf) {
  return (VARIANT_LABELS[suf] || { tab: suf.toUpperCase() }).tab;
}

function attrPill(u) {
  if (!u.attribute) return "";
  return `<span class="attr ${u.attribute}">${u.attribute}</span>`;
}
function rolePill(u) {
  const r = roleOf(u);
  if (!r) return "";
  return `<span class="cls">${roleLabel(r)}</span>`;
}
function rarityStars(u) {
  if (!u.rarity) return "";
  return `<span class="stars" title="${u.rarity}★">${"★".repeat(u.rarity)}</span>`;
}

// Hub uses a tighter, FX-stripped thumb.png when available and
// falls back to pose.png when render_thumbs.js skipped the slug (no FX
// slots to strip). The detail page always uses pose.png regardless.
// Hub thumbnail source chain: thumb → pose → face. Each candidate is
// {url, trim?}. The first entry is loaded; remaining entries are JSON-encoded
// onto data-fallbacks and walked by hubFallback() on img.onerror. This
// survives a stale-cache scenario where units.json still references a
// thumb.png that has since been removed: the chain rolls forward to pose
// instead of jumping straight to the face artwork.
function hubCandidates(u) {
  const out = [];
  // thumb.png is baked tight at render time (smart-crop in render_thumbs.js),
  // so no trim sidecar is needed for it. pose.png still uses pose_trim.
  if (u.thumb) out.push({ url: u.thumb, trim: null });
  if (u.pose)  out.push({ url: u.pose,  trim: u.pose_trim  || null });
  if (!u.thumb && !u.pose) out.push({ url: `assets/${u.id}/pose.png`, trim: null });
  if (u.artworks && u.artworks[0]) out.push({ url: u.artworks[0], trim: null });
  return out;
}

function hubFallback(img) {
  let queue;
  try { queue = JSON.parse(img.dataset.fallbacks || "[]"); } catch { queue = []; }
  if (!queue.length) {
    img.onerror = null;
    img.style.display = "none";
    return;
  }
  const next = queue.shift();
  img.dataset.fallbacks = JSON.stringify(queue);
  if (next.trim) img.dataset.trim = JSON.stringify(next.trim);
  else delete img.dataset.trim;
  // Wipe positioning applyTrimCrop left on the prior source so the next
  // onload recomputes crop from scratch (or no-op if the new src has no trim).
  img.removeAttribute("style");
  img.src = next.url;
}

function thumb(u, group) {
  const cands = hubCandidates(u);
  const head  = cands.shift() || { url: "", trim: null };
  const tail  = cands;
  // Form-swap pills: visual-only preview of sibling variants. Click handlers
  // (wired in hub()) swap the <img> src in place and stopPropagation so the
  // card-level navigation isn't triggered. Each pill carries the variant's
  // full thumb→pose→face chain so a stale thumb URL doesn't degrade to face.
  const swap = (group && group.length > 1) ? `<div class="form-swap">${group.map((v, i) => {
    const vc  = hubCandidates(v);
    const vh  = vc.shift() || { url: "", trim: null };
    const lab = variantTab(v.variant || "");
    return `<button type="button" data-fs-src="${escapeHtml(vh.url)}" data-fs-fallbacks='${JSON.stringify(vc)}' data-fs-variant="${escapeHtml(v.variant || "")}"${vh.trim ? ` data-fs-trim='${JSON.stringify(vh.trim)}'` : ''}${i===0?' class="on"':''} title="preview ${escapeHtml(lab)}">${escapeHtml(lab)}</button>`;
  }).join("")}</div>` : "";
  // src is held in data-src and lifted onto the element only when the card is
  // near the viewport (hubImgObserver below). On scroll-away before load, the
  // src attribute is removed, which aborts the in-flight network request.
  return `<div class="thumb">
    <img data-src="${head.url}" data-fallbacks='${JSON.stringify(tail)}' onerror="hubFallback(this)"${head.trim ? ` data-trim='${JSON.stringify(head.trim)}'` : ''} onload="this.dataset.loaded='1';applyTrimCrop(this)">
    ${swap}
  </div>`;
}

function card(group) {
  // group is the array of variants under the same base_id; show representative.
  const u = group[0];
  const totalArt = group.reduce((n,x) => n + (x.artworks_count || (x.artworks||[]).length), 0);
  const hasSkill = group.some(x => (x.skills||[]).length);
  const variantsN = group.length;
  const base = u.base_id || u.id;
  const isNew = group.some(x => x.new);
  return `<a class="card${isNew ? ' is-new' : ''}" href="#/u/${encodeURIComponent(base)}" data-base="${base}">
    ${thumb(u, group)}
    ${isNew ? `<span class="new-badge">NEW</span>` : ""}
    ${variantsN > 1 ? `<span class="variant-badge">${variantsN} forms</span>` : ""}
    <div class="meta">
      <div class="name">${escapeHtml(displayName(u))}</div>
      <div class="id">${base}</div>
      <div class="sub">
        ${rarityStars(u)} ${attrPill(u)} ${rolePill(u)}
        ${group.some(x => (x.spine||[]).length) ? `<span class="tag spine">rig</span>` : ""}
        ${totalArt ? `<span class="tag art">${totalArt} art</span>` : ""}
        ${hasSkill ? `<span class="tag skill">skill</span>` : ""}
      </div>
    </div>
  </a>`;
}

// applyTrimCrop — called from hub card <img onload> and after hub() re-renders.
// Reads pre-baked trim fractions from data-trim (written by build_index.py from
// tools/compute_trim_data.js sidecars). No canvas scan — zero GPU/CPU cost.
// Units without a data-trim attribute (character fills the full frame) are skipped.
function applyTrimCrop(img) {
  const raw = img.dataset.trim;
  if (!raw) return;
  const trim = JSON.parse(raw);
  const { l, t, fw, fh } = trim;
  const iw = img.naturalWidth, ih = img.naturalHeight;
  if (!iw || !ih) return;
  const wrap = img.parentElement;
  const cw = wrap.clientWidth, ch = wrap.clientHeight;
  if (!cw || !ch) return;
  const scale   = Math.min(cw / (fw * iw), ch / (fh * ih));
  const imgLeft = (cw - fw * iw * scale) / 2 - l * iw * scale;
  const imgTop  = (ch - fh * ih * scale) / 2 - t * ih * scale;
  img.style.cssText = `position:absolute;padding:0;max-width:none;` +
    `width:${(iw * scale).toFixed(1)}px;height:${(ih * scale).toFixed(1)}px;` +
    `left:${imgLeft.toFixed(1)}px;top:${imgTop.toFixed(1)}px`;
}

// Hub image lazy-loader. Native loading="lazy" queues every <img>
// in document order with no abort path, so a fast scroll past ~800 cards keeps
// the network busy fetching what the user already scrolled past — and that
// stalls the cards they're actually looking at on mobile. With IntersectionObserver
// we set src only when a card enters the rootMargin band, and removeAttribute('src')
// on exit aborts the in-flight request. Recreated per hub() render so detached
// nodes don't accumulate.
let _hubImgObs = null;
function observeHubImages() {
  if (_hubImgObs) _hubImgObs.disconnect();
  _hubImgObs = new IntersectionObserver((entries) => {
    for (const ent of entries) {
      const img = ent.target;
      if (ent.isIntersecting) {
        const want = img.dataset.src;
        if (want && !img.dataset.loaded && img.getAttribute("src") !== want) {
          img.setAttribute("src", want);
        }
      } else if (!img.dataset.loaded) {
        img.removeAttribute("src");
      }
    }
  }, { rootMargin: "400px 0px", threshold: 0 });
  document.querySelectorAll(".grid .thumb img[data-src]").forEach(img => _hubImgObs.observe(img));
}

function escapeHtml(s) {
  return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function hub() {
  setNav("hub");
  const q = searchQ.toLowerCase().trim();

  // Build groups: one entry per base_id. The group's "kind" is its representative's kind.
  const groups = Array.from(BY_BASE.values())
    .map(g => g.slice().sort((a,b) => (a.variant||"").localeCompare(b.variant||"")));
  const kindCounts = {};
  groups.forEach(g => { const k = g[0].kind; kindCounts[k] = (kindCounts[k]||0)+1; });
  const kinds = ["all", ...Object.keys(kindCounts).sort((a,b)=>kindCounts[b]-kindCounts[a])];

  const list = groups.filter(g => {
    if (kindF !== "all" && g[0].kind !== kindF) return false;
    // Element/rarity: OR within a category (any selected matches), AND across
    // categories. A group passes if at least one of its variants matches.
    if (elementF.size && !g.some(u => u.attribute && elementF.has(u.attribute))) return false;
    if (rarityF.size  && !g.some(u => u.rarity    && rarityF.has(u.rarity)))    return false;
    if (roleF.size    && !g.some(u => roleOf(u)   && roleF.has(roleOf(u))))     return false;
    if (!q) return true;
    return g.some(u =>
      (u.id || "").toLowerCase().includes(q) ||
      (u.name || "").toLowerCase().includes(q) ||
      (u.slug || "").toLowerCase().includes(q) ||
      (u.hero_name || "").toLowerCase().includes(q)
    );
  });
  // Sort: NEW units first, then named heroes (alpha), then unnamed by id.
  list.sort((a,b) => {
    const newA = a.some(x => x.new), newB = b.some(x => x.new);
    if (newA !== newB) return newA ? -1 : 1;
    const na = (a[0].hero_name || a[0].name || "").toLowerCase();
    const nb = (b[0].hero_name || b[0].name || "").toLowerCase();
    if (na && nb) return na.localeCompare(nb);
    if (na) return -1;
    if (nb) return  1;
    return (a[0].id || "").localeCompare(b[0].id || "");
  });

  $("#app").innerHTML = `
    ${demo ? `<div class="demo">DEMO DATA — run <code>python build_index.py --img &lt;img_output&gt; --raw &lt;output&gt; --out ./site</code> then reload.</div>` : ""}
    <div class="bar">
      <div class="q-wrap">
        <input id="q" placeholder="search name or id  ·  iseria, c1019, ravi…" value="${escapeHtml(searchQ)}" inputmode="${qMode==='num'?'numeric':'search'}" autocapitalize="off" autocorrect="off" spellcheck="false">
        <button id="qmode" type="button" class="qmode${qMode==='num'?' on':''}" title="toggle text / numeric keyboard">${qMode==='num'?'ABC':'123'}</button>
      </div>
      <span class="count">${list.length} / ${groups.length}</span>
    </div>
    <div class="kinds">${kinds.map(k => {
      const label = k === "all" ? "ALL" : (KIND_LABELS[k] || k).toUpperCase();
      const n = k === "all" ? groups.length : (kindCounts[k]||0);
      return `<button data-k="${k}" class="${k===kindF?'on':''}">${label}<span class="n">${n}</span></button>`;
    }).join("")}</div>
    <div class="filters">
      <div class="fgroup">
        <span class="flabel">element</span>
        ${ELEMENTS.map(e =>
          `<button class="chip el-${e} ${elementF.has(e)?'on':''}" data-el="${e}">${e}</button>`
        ).join("")}
      </div>
      <div class="fgroup">
        <span class="flabel">class</span>
        ${ROLES.map(r =>
          `<button class="chip ${roleF.has(r)?'on':''}" data-role="${r}">${roleLabel(r)}</button>`
        ).join("")}
      </div>
      <div class="fgroup">
        <span class="flabel">rarity</span>
        ${RARITIES.map(r =>
          `<button class="chip rar ${rarityF.has(r)?'on':''}" data-rar="${r}">${'★'.repeat(r)}</button>`
        ).join("")}
      </div>
      ${(elementF.size || rarityF.size || roleF.size) ? `<button class="chip clear" data-clear="1">clear</button>` : ""}
    </div>
    <div class="grid">${list.map(card).join("") || '<p class="empty">no match.</p>'}</div>`;

  const i = $("#q");
  i.oninput = (e) => {
    searchQ = e.target.value;
    hub();
    queueMicrotask(() => {
      const n = $("#q");
      if (!n) return;
      n.focus();
      n.setSelectionRange(searchQ.length, searchQ.length);
    });
  };
  // ABC/123 toggle. Mobile keyboards only pick up an inputmode change after
  // blur + refocus, so swap the attribute then bounce focus to redraw the IME.
  const qm = $("#qmode");
  if (qm) qm.onclick = (e) => {
    e.preventDefault();
    qMode = qMode === "num" ? "text" : "num";
    i.setAttribute("inputmode", qMode === "num" ? "numeric" : "search");
    qm.textContent = qMode === "num" ? "ABC" : "123";
    qm.classList.toggle("on", qMode === "num");
    i.blur();
    i.focus();
    i.setSelectionRange(searchQ.length, searchQ.length);
  };
  document.querySelectorAll(".kinds button").forEach(b => b.onclick = () => { kindF = b.dataset.k; hub(); });
  document.querySelectorAll(".filters .chip").forEach(b => b.onclick = () => {
    if (b.dataset.clear) { elementF.clear(); rarityF.clear(); roleF.clear(); }
    else if (b.dataset.el)   { elementF.has(b.dataset.el) ? elementF.delete(b.dataset.el) : elementF.add(b.dataset.el); }
    else if (b.dataset.rar)  { const r = +b.dataset.rar; rarityF.has(r) ? rarityF.delete(r) : rarityF.add(r); }
    else if (b.dataset.role) { roleF.has(b.dataset.role) ? roleF.delete(b.dataset.role) : roleF.add(b.dataset.role); }
    hub();
  });
  // Cards are real <a href="#/u/..."> anchors — gives native middle-click /
  // right-click "Open in new tab" + Ctrl/Cmd-click without any extra JS.
  // Form-swap pills inside thumbs: preview a sibling variant's pose without
  // navigating. Visual-only — does NOT change the card's detail-page target.
  // preventDefault is required because the pill is nested inside the card's
  // <a>; stopPropagation alone isn't enough to block the anchor on some
  // browsers when the click target is a descendant.
  document.querySelectorAll(".form-swap button").forEach(b =>
    b.onclick = (e) => {
      e.preventDefault();
      e.stopPropagation();
      const img = b.closest(".thumb").querySelector("img");
      if (!img) return;
      img.removeAttribute("style");
      const t = b.dataset.fsTrim;
      if (t) img.dataset.trim = t; else delete img.dataset.trim;
      img.dataset.fallbacks = b.dataset.fsFallbacks || "[]";
      img.src = b.dataset.fsSrc;
      // applyTrimCrop fires on the resulting onload; ensure it runs even when
      // the image is already cached.
      if (img.complete && img.naturalWidth) applyTrimCrop(img);
      b.parentElement.querySelectorAll("button").forEach(x => x.classList.toggle("on", x === b));
      // Retarget the card's <a href> at the previewed variant so middle-/right-
      // click "Open in new tab" lands on the form the user is actually looking at.
      const card = b.closest(".card");
      if (card) {
        const base = card.dataset.base;
        const v = b.dataset.fsVariant || "";
        card.setAttribute("href", "#/u/" + encodeURIComponent(base) + (v ? "/" + encodeURIComponent(v) : ""));
      }
      // Drop focus so :focus-within doesn't pin .form-swap visible after the
      // mouse leaves the card. Keyboard tab-focus is unaffected.
      b.blur();
    });
  // Lazy-load: lifts data-src onto src as cards enter the viewport. Recreated
  // per render so detached nodes from the previous render don't accumulate.
  observeHubImages();
  // For images already in the browser cache, onload won't re-fire — apply crop now.
  requestAnimationFrame(() => {
    document.querySelectorAll(".thumb img").forEach(img => {
      if (img.complete && img.naturalWidth) applyTrimCrop(img);
    });
  });
}

const PG_LABEL = { heroes: "Heroes", art: "Artwork", effects: "Effects", engine: "Engine / data", other: "Other" };
const PG_ORDER = ["heroes", "art", "effects", "engine", "other"];
const CHANGE_SYM = { added: "+", removed: "−", changed: "~" };

function fmtBytes(n) {
  if (n == null) return "";
  if (n < 1024) return n + " B";
  if (n < 1048576) return (n / 1024).toFixed(1) + " KB";
  return (n / 1048576).toFixed(2) + " MB";
}

function patchEntryRow(e) {
  const sym = CHANGE_SYM[e.change] || "·";
  const delta = (e.old_size != null)
    ? ` <span class="pe-size">${fmtBytes(e.old_size)} → ${fmtBytes(e.new_size)}</span>` : "";
  const label = e.name ? escapeHtml(e.name) : `<code>${escapeHtml(e.path)}</code>`;
  return `<div class="pe pe-${e.change}"><span class="pe-sym">${sym}</span> ${label}${delta}</div>`;
}

function patchBlock(p) {
  const groups = p.groups || {};
  // Visual cards: hero/art entries that resolved to a staged pose thumbnail.
  const thumbs = [];
  for (const g of ["heroes", "art"]) for (const e of (groups[g] || [])) {
    if (e.pose) thumbs.push(e);
  }
  const thumbHtml = thumbs.length ? `<div class="patch-thumbs">${thumbs.map(e => `
    <a class="pt" href="#/u/${encodeURIComponent(e.unit || e.slug)}" title="${escapeHtml((e.name || e.slug))} — ${e.change}">
      <span class="pt-badge pt-${e.change}">${CHANGE_SYM[e.change] || "·"}</span>
      <img loading="lazy" src="${e.pose}" alt="${escapeHtml(e.name || e.slug)}">
      <span class="pt-name">${escapeHtml(e.name || e.slug)}</span>
    </a>`).join("")}</div>` : "";

  // Text rollup per group (everything, including the thumbnailed ones).
  const groupHtml = PG_ORDER.filter(g => (groups[g] || []).length).map(g => `
    <div class="patch-group">
      <span class="pg-label">${PG_LABEL[g]} <span class="pg-n">${groups[g].length}</span></span>
      <div class="pg-items">${groups[g].map(patchEntryRow).join("")}</div>
    </div>`).join("");

  const c = p.counts || {};
  return `<div class="patch">
    <div class="patch-head">
      <h3>Data pack · ${escapeHtml(p.label || p.id)}</h3>
      <span class="code count">+${c.added||0} · −${c.removed||0} · ~${c.changed||0}</span>
      ${p.date ? `<span class="code">${escapeHtml(p.date)}</span>` : ""}
    </div>
    ${thumbHtml}
    <details class="patch-raw"${thumbs.length ? "" : " open"}><summary>file changes by area</summary>${groupHtml}</details>
  </div>`;
}

function updates() {
  setNav("updates");
  const labels = Object.keys(UPDATES);
  if (!labels.length && !PATCHES.length) {
    $("#app").innerHTML = `<p class="empty">No updates indexed — run build_index.py.</p>`;
    return;
  }
  labels.sort((a, b) => {
    // Newest first: prefer the explicit `year` field on each entry (derived
    // from the codename's year-digit in build_index.py); fall back to a year
    // baked into the label (legacy KNOWN_UPDATES "Summer 2025" shape) so any
    // stale data still sorts sensibly. Equal years -> alphabetical.
    const yearOf = (label) => {
      const u = UPDATES[label];
      if (u && typeof u.year === "number") return u.year;
      const m = label.match(/\b(20\d{2})\b/);
      return m ? parseInt(m[1]) : 0;
    };
    return yearOf(b) - yearOf(a) || a.localeCompare(b);
  });

  const patchHtml = PATCHES.length ? `
    <p class="section-label first">Patch diff · last ${PATCHES.length} data pack${PATCHES.length>1?'s':''} · previews hosted temporarily</p>
    <p class="patch-note">Unannounced content is intentionally omitted — E7 Codex archives released Epic Seven assets and avoids surfacing anything Smilegate hasn't revealed yet.</p>
    <div class="patches">${PATCHES.map(patchBlock).join("")}</div>` : "";

  $("#app").innerHTML = `${patchHtml}
    <p class="section-label${PATCHES.length?'':' first'}">${labels.length} update codenames discovered · per-unit tagging requires the encrypted output/db</p>
    <div class="updates-list">${labels.map(label => {
      const u = UPDATES[label];
      const story = u.story || [];
      return `<div class="upd-row">
        <div class="upd-head">
          <h3>${escapeHtml(label)}</h3>
          <span class="code">${u.codename}${u.year ? ` · ${u.year}` : ''}</span>
          <span class="code count">${u.banners.length} banner${u.banners.length>1?'s':''}${story.length ? ` · ${story.length} story` : ''}</span>
        </div>
        <div class="upd-banners">
          ${u.banners.map(b => `<a href="${b}" data-zoom data-cap="${escapeHtml(label)} banner" target="_blank" rel="noopener"><img loading="lazy" src="${b}" alt="${u.codename}"></a>`).join("")}
        </div>
        ${story.length ? `<div class="upd-story">
          ${story.map(s => `<a href="${s}" data-zoom data-cap="${escapeHtml(label)} story" target="_blank" rel="noopener"><img loading="lazy" src="${s}" alt="${u.codename} story"></a>`).join("")}
        </div>` : ''}
      </div>`;
    }).join("")}</div>`;
}

// Per-hero voice section. Actor credits come from data/voices.json (decoded from
// character_voice.db). Playable voice lines come from data/voices_audio.json (a
// catalog built from the FMOD bank sample names — see tools/extract_voice_audio.py);
// the audio OGGs are served from VOICE_BASE/<lang>/voc_<slug>_<action>_<take>.ogg.
// Clicking a clip opens the shared lightbox in audio mode.
const VOICE_LANGS = [["en","EN"],["ja","JA"],["kr","KR"],["zhs","CN"]];   // actor-credit langs
const AUDIO_LANGS = [["en","EN"],["ja","JA"],["ko","KR"]];               // available audio langs
const VOICE_CATS  = [["battle","Battle"],["skill","Skill"],["camping","Camping"],["misc","Other"]];
// Priority order for action rows (lower = earlier); unknown actions sort last by label.
const ACTION_ORDER = ["skill1","sk1","shout","skill2","sk2","skill3","sk3","skill3_1","sk3_1",
  "skill3_2","sk3_2","skill3_3","sk3_3","skill3_4","sk3_4","attacked","dmg","answer","call",
  "win","lose","defeat","dead","lvup","lv","get","idle","idle_s","utterance","camping","emotion","touch"];
// Group clip actions onto their own rows: skills | combat | status events | rest.
const VCLIP_GROUPS = [
  ["skills", "Skills",  a => a === "shout" || a.startsWith("skill") || /^sk\d/.test(a)],
  ["combat", "Combat",  a => ["attacked","dmg","answer","call"].includes(a)],
  ["status", "Status",  a => ["win","lose","defeat","dead","lvup","lv","get"].includes(a)],
  ["other",  "Idle & misc", () => true],
];
let voiceLang = "en";
function voiceFor(u) { return VOICES[u.id] || VOICES[u.base_id] || null; }
function clipsFor(u) {
  if (VOICE_CLIPS[u.id]) return [u.id, VOICE_CLIPS[u.id]];
  if (u.base_id && VOICE_CLIPS[u.base_id]) return [u.base_id, VOICE_CLIPS[u.base_id]];
  return [null, null];
}
function clipLangHas(clips, lang) {
  return Object.values(clips).some(c => (c.takes[lang] || []).length);
}
// Render the grouped, playable clip rows for ONE language. Only actions/takes
// that have an OGG on disk for `lang` are shown (per-lang availability lives in
// the catalog), so a JA-only take never renders a dead EN button.
function renderVoiceClips(clipSlug, clips, lang) {
  const actions = Object.keys(clips)
    .filter(a => (clips[a].takes[lang] || []).length)
    .sort((a,b) => {
      const ia = ACTION_ORDER.indexOf(a), ib = ACTION_ORDER.indexOf(b);
      return (ia<0?999:ia) - (ib<0?999:ib) || clips[a].label.localeCompare(clips[b].label);
    });
  const buckets = {};
  for (const act of actions) {
    const grp = (VCLIP_GROUPS.find(([,,test]) => test(act)) || VCLIP_GROUPS[VCLIP_GROUPS.length-1])[0];
    const { label } = clips[act];
    const takes = clips[act].takes[lang];
    (buckets[grp] = buckets[grp] || []).push(...takes.map(t => {
      const lab = takes.length > 1 ? `${label} ${t}` : label;
      return `<button class="vlclip" data-slug="${clipSlug}" data-action="${escapeHtml(act)}" data-take="${t}" data-label="${escapeHtml(label)}">▶ ${escapeHtml(lab)}</button>`;
    }));
  }
  return VCLIP_GROUPS.filter(([k]) => buckets[k]).map(([k, glab]) =>
    `<div class="vl-group"><div class="vl-cat">${glab}</div><div class="vl-items">${buckets[k].join("")}</div></div>`).join("");
}
function voiceSection(u) {
  const v = voiceFor(u);
  const [clipSlug, clips] = clipsFor(u);
  if (!v && !clips) return "";
  let html = `<p class="section-label">Voice</p>`;
  if (v && v.actors) {
    const cells = VOICE_LANGS.filter(([k]) => v.actors[k])
      .map(([k,lab]) => `<span class="va"><span class="lang">${lab}</span><span class="nm">${escapeHtml(v.actors[k])}</span></span>`).join("");
    if (cells) html += `<div class="voice-actors">${cells}</div>`;
  }
  if (clips) {
    // Only offer languages this hero actually has clips for; pick an effective
    // lang (the current global pick, or the first available) for the first render.
    const avail = AUDIO_LANGS.filter(([k]) => clipLangHas(clips, k));
    const lang = avail.some(([k]) => k === voiceLang) ? voiceLang : (avail[0] ? avail[0][0] : voiceLang);
    const langBtns = avail.map(([k,lab]) =>
      `<button class="vlang${k===lang?' on':''}" data-lang="${k}">${lab}</button>`).join("");
    html += `<div class="vlang-row">${langBtns}<span class="vlang-hint">click a line to play</span></div>`;
    html += `<div class="voice-lines" id="voiceClips" data-clipslug="${clipSlug}">${renderVoiceClips(clipSlug, clips, lang)}</div>`;
  } else if (v && (v.lines||[]).length) {
    // fallback: non-playable DB catalog (heroes without extracted audio yet)
    const byCat = {};
    for (const ln of v.lines) (byCat[ln.category] = byCat[ln.category] || []).push(ln);
    const groups = VOICE_CATS.filter(([c]) => byCat[c]).map(([c,lab]) => {
      const items = byCat[c].map(ln => `<span title="${escapeHtml(ln.event)}">${escapeHtml(ln.label)}</span>`).join("");
      return `<div class="vl-group"><div class="vl-cat">${lab} · ${byCat[c].length}</div><div class="vl-items">${items}</div></div>`;
    }).join("");
    html += `<div class="voice-lines">${groups}</div>`;
  }
  return html;
}

function detail(baseId, variantSuf) {

    // Maybe the URL has a full variant id like c1019_s01 — fall back to BY_BASE lookup by full id.

    $("#app").innerHTML = '<p class="empty">unknown id: ' + escapeHtml(baseId) + '</p>';
    return;

  // Pick the unit matching variantSuf, or the first variant if not specified/missing.
  const u = group.find(x => (x.variant || "") === (variantSuf || "")) || group[0];

            run <code>python tools/prepare_assets.py ${u.id}</code> then
            <code>node tools/render_poses.js ${u.id}</code>.

        </div>

          <button data-rm="thumb">Thumb</button>

        ${group.length > 1 ? `<div class="pose-switch" title="preview another variant's pose without leaving this page">

            const pp = v.pose || `assets/${v.id}/pose.png`;

          }).join("")}

        ${rigs.length ? `<p class="section-label">static render · spine ${rigs[0].version || '3.8.99'}</p>` : ''}
      </div>
      <div>

          <div class="ids">${u.id}${u.base_id && u.base_id !== u.id ? ` · base ${u.base_id}` : ''}</div>
          <div class="meta-row">
            ${rarityStars(u)} ${attrPill(u)}
            ${u.role ? `<span class="tag" style="color:var(--mut);border:1px solid var(--line);text-transform:capitalize">${u.role}</span>` : ''}
            <span class="tag" style="color:var(--mut);border:1px solid var(--line)">${KIND_LABELS[u.kind] || u.kind}</span>
          </div>
        </div>
        ${group.length > 1 ? `<div class="variant-tabs">${group.map(v => {

          const sub = (VARIANT_LABELS[v.variant || ""] || {}).tagline || "";
          return `<button data-vs="${v.variant || ''}" class="${(v.variant||'')===(u.variant||'')?'on':''}">
            ${escapeHtml(lab)}${sub ? `<span class="tl">${escapeHtml(sub)}</span>` : ''}
          </button>`;
        }).join("")}</div>` : ''}
        <div class="extbar">

          ${(u.updates||[]).map(x => `<span class="ext flat">${escapeHtml(x)}</span>`).join("")}

          <p class="section-label first">Skill animation</p>
          <div class="skill-gallery">${u.skills.map((s,i) => {
            const lbl = u.skills.length > 1 ? `Skill animation ${i+1}` : "Skill animation";
            return `<a href="${s}" data-zoom data-cap="${escapeHtml(u.id)} · ${lbl}" target="_blank" rel="noopener"><img loading="lazy" src="${s}" alt="${escapeHtml(u.id)} skill ${i+1}"></a>`;
          }).join("")}</div>
        ` : ''}
        ${u.intimacy ? `
          <p class="section-label${!(u.skills||[]).length ? ' first' : ''}">Intimacy illustration</p>
          <div class="skill-gallery"><a href="${u.intimacy}" data-zoom data-cap="${escapeHtml(displayName(u))} · Intimacy illustration" target="_blank" rel="noopener"><img loading="lazy" src="${u.intimacy}" alt="${escapeHtml(u.id)} intimacy illustration"></a></div>
        ` : ''}
        ${voiceSection(u)}
        <p class="section-label">Bundled artwork</p>
        ${(u.artworks||[]).length
          ? `<div class="gallery">${u.artworks.map(a => `<a href="${a}" data-zoom data-cap="${escapeHtml(displayName(u))} · ${escapeHtml(a.split('/').pop())}" target="_blank" rel="noopener"><img loading="lazy" src="${a}"></a>`).join("")}</div>`
          : `<p class="empty" style="padding:18px 0;text-align:left">${artN ? `${artN} related image${artN!==1?'s':''} exist in img_output/ but aren't bundled in the site (size budget). Browse the local dump for the full gallery.` : 'no img_output matches for this id.'}</p>`
        }
      </div>
    </div>`;

  // Wire variant tabs without re-routing — the variant lives in the URL hash so
  // back/forward still works and deep-linking to c1019/s01 is shareable.
  document.querySelectorAll(".variant-tabs button").forEach(b =>
    b.onclick = () => {
      const v = b.dataset.vs;
      location.hash = "#/u/" + baseId + (v ? "/" + v : "");
    });

  // Pose quick-switch: swap only the displayed pose image between variants
  // without rerouting. Variant-tabs above are the right tool for a full
  // page swap; this is for "what does the other skin's pose look like" without
  // losing the current variant's metadata/skills/gallery context.
  // Variant pose-switch (NOT the render-switch) — preview a sibling variant's
  // pose. `.render-switch button` is excluded so its handler below owns it.
  // Tracks the active variant's pose/thumb so the Base/Thumb toggle stays
  // pointed at the right pair after a variant preview.
  let rsPose  = u.pose || `assets/${u.id}/pose.png`;
  let rsThumb = u.thumb || "";
  let rsId    = u.id;
  function setPoseImage(url, capSuffix) {
    const img = document.getElementById("poseimg");
    if (!img || !url) return;
    img.removeAttribute("style");      // wipe applyTrimCrop's positioning
    img.removeAttribute("data-trim");  // use the image's own natural framing
    img.style.display = "";
    img.src = url;
    const anchor = img.parentElement;
    if (anchor && anchor.tagName === "A") {
      anchor.href = url;
      anchor.dataset.cap = `${rsId} · ${capSuffix}`;
      anchor.setAttribute("data-zoom", "");
    }
  }
  // Base/Thumb render toggle (only present when the unit has a thumb.png).
  const renderSwitch = document.querySelector(".render-switch");
  function applyRenderMode(mode) {
    const url = mode === "thumb" ? rsThumb : rsPose;
    if (!url) return;
    setPoseImage(url, mode === "thumb" ? "thumb.png" : "pose.png");
    if (renderSwitch) renderSwitch.querySelectorAll("button")
      .forEach(x => x.classList.toggle("on", x.dataset.rm === mode));
  }
  if (renderSwitch) renderSwitch.querySelectorAll("button")
    .forEach(b => b.onclick = () => applyRenderMode(b.dataset.rm));

  document.querySelectorAll(".pose-switch:not(.render-switch) button").forEach(b =>
    b.onclick = () => {
      rsPose = b.dataset.pose;
      rsThumb = b.dataset.thumb || "";
      rsId = b.dataset.id;
      setPoseImage(rsPose, "pose.png");   // previewing a variant always starts at Base
      document.querySelectorAll(".pose-switch:not(.render-switch) button")
        .forEach(x => x.classList.toggle("on", x === b));
      // Re-sync the render toggle: back to Base, and disable Thumb if this
      // variant has no baked thumb.png.
      if (renderSwitch) {
        renderSwitch.querySelectorAll("button")
          .forEach(x => x.classList.toggle("on", x.dataset.rm === "base"));
        const tb = renderSwitch.querySelector('button[data-rm="thumb"]');
        if (tb) { tb.disabled = !rsThumb; tb.style.opacity = rsThumb ? "" : ".4"; }
      }
    });
}

function emotes() {
  setNav("emotes");
  if (!EMOTES.length) {
    $("#app").innerHTML = `<p class="empty">No emotes indexed — run build_index.py.</p>`;
    return;
  }
  // Sort: NEW first, then linked (clickable) first, alphabetically by hero name;
  // unlinked at the bottom by id.
  const sorted = EMOTES.slice().sort((a, b) => {
    const nwA = a.new ? 0 : 1, nwB = b.new ? 0 : 1;
    if (nwA !== nwB) return nwA - nwB;
    const ka = a.base_id ? 0 : 1, kb = b.base_id ? 0 : 1;
    if (ka !== kb) return ka - kb;
    const na = (a.hero_name || a.id).toLowerCase();
    const nb = (b.hero_name || b.id).toLowerCase();
    return na.localeCompare(nb);
  });
  const totalEmotes = EMOTES.reduce((n, g) => n + g.emotes.length, 0);
  const linkedCount = EMOTES.filter(g => g.base_id).length;
  $("#app").innerHTML = `
    <p class="section-label first">${EMOTES.length} character groups · ${totalEmotes} emote files · ${linkedCount} linked to a unit page</p>
    <div class="emote-list">${sorted.map(g => {
      const clickable = !!g.base_id;
      const heroLabel = g.hero_name || g.id;
      return `<div class="emote-row${clickable ? ' link' : ''}" ${clickable ? `data-base="${g.base_id}"` : ''}>
        <div class="emote-who">
          <div class="who-name">${escapeHtml(heroLabel)}${g.new ? `<span class="new-badge inline">NEW</span>` : ""}</div>
          <div class="who-id">${escapeHtml(g.id)}${g.slug && g.slug !== g.id ? ` · ${escapeHtml(g.slug)}` : ''}</div>
          <div class="who-count">${g.emotes.length} emote${g.emotes.length!==1?'s':''} · ${clickable ? 'open detail →' : 'no unit page'}</div>
        </div>
        <div class="emote-grid">${g.emotes.map(e => `
          <a class="emote-cell${e.animated ? ' animated' : ''}" href="${e.file}" data-zoom data-cap="${escapeHtml(heroLabel)} · ${escapeHtml(e.theme)}${e.animated ? ' (animated)' : ''}" target="_blank" rel="noopener" title="${escapeHtml(e.theme)}${e.animated ? ' (animated)' : ''}">
            <img loading="lazy" src="${e.file}" alt="${escapeHtml(e.theme)}">
            <span class="theme">${escapeHtml(e.theme)}</span>
          </a>`).join("")}</div>
      </div>`;
    }).join("")}</div>`;
  // Navigate to the unit page when the user clicks the row chrome (name/id
  // column). Don't intercept clicks that originated inside an emote-cell —
  // those open the lightbox via the global a[data-zoom] handler.
  document.querySelectorAll(".emote-row.link").forEach(r =>
    r.onclick = (e) => {
      if (e.target.closest(".emote-cell")) return;
      location.hash = "#/u/" + r.dataset.base;
    }
  );
}

const WP_CAT_LABEL = { lobby:"Lobby BG", event:"Event splash", episode:"Episode art", story:"Story bg" };
function wallpapers() {

// Lobby horizontal cut + portrait full-art shown side-by-side in a grid.
// Card click → lightbox of the portrait; small "↗ cb" pill links to ceciliabot
// (deep link when the artifact has a slug, hub index otherwise). Rarity + role
// filter chips compose like the hub's element/rarity filters.
const ARTI_ROLES = ["warrior", "knight", "ranger", "mage", "soul-weaver", "thief"];
// ceciliabot stores some roles with quirky spelling; normalize for the chips:
const ARTI_ROLE_ALIAS = { "manauser": "soul-weaver", "theif": "thief", "assassin": "thief" };
function artiRoleOf(a) { return ARTI_ROLE_ALIAS[a.role] || a.role || ""; }
function artiRarityStars(r) { return r ? "★".repeat(r) : ""; }

function artifacts() {
  setNav("artifacts");
  if (!ARTIFACTS.length) {
    $("#app").innerHTML = `<p class="empty">No artifacts indexed — run build_index.py.</p>`;
    return;
  }
  const q = artiSearchQ.trim().toLowerCase();
  const list = ARTIFACTS.filter(a => {
    if (artiRarityF.size && !artiRarityF.has(a.rarity)) return false;
    if (artiRoleF.size  && !artiRoleF.has(artiRoleOf(a))) return false;
    if (!q) return true;
    return (a.name && a.name.toLowerCase().includes(q))
        || a.id.toLowerCase().includes(q);
  });
  const rarities = [5, 4, 3, 2, 1];
  const rarityCounts = {};
  const roleCounts = {};
  for (const a of ARTIFACTS) {
    if (a.rarity) rarityCounts[a.rarity] = (rarityCounts[a.rarity]||0)+1;
    const role = artiRoleOf(a);
    if (role) roleCounts[role] = (roleCounts[role]||0)+1;
  }
  const roleList = ARTI_ROLES.filter(r => roleCounts[r]);

  $("#app").innerHTML = `
    <div class="bar">
      <div class="q-wrap">
        <input id="qArti" placeholder="search artifacts by name or art####"
               value="${escapeHtml(artiSearchQ)}" inputmode="search">
      </div>
    </div>
    <p class="section-label first">${list.length} of ${ARTIFACTS.length} artifacts · click any for full art</p>
    <div class="kinds" id="artiRarity">
      ${rarities.filter(r => rarityCounts[r]).map(r => `
        <button data-r="${r}" class="${artiRarityF.has(r)?'on':''}">${artiRarityStars(r)}<span class="n">${rarityCounts[r]}</span></button>`).join("")}
    </div>
    <div class="kinds" id="artiRole">
      ${roleList.map(r => `
        <button data-role="${r}" class="${artiRoleF.has(r)?'on':''}">${r.replace('-',' ')}<span class="n">${roleCounts[r]}</span></button>`).join("")}
    </div>
    <div class="artifact-grid">${list.map(a => {
      const name = a.name || a.id;
      const role = artiRoleOf(a);
      const roleCap = role ? role.charAt(0).toUpperCase() + role.slice(1) : "";
      const rarity = a.rarity ? `${a.rarity}★` : "";
      const meta = [rarity, roleCap].filter(Boolean).join(" · ");
      const cap = [name, meta].filter(Boolean).join(" · ");
      const cb = a.cecilia || "";
      return `
      <a class="artifact-cell${a.new ? ' is-new' : ''}" href="${a.art_full}" data-zoom data-cap="${escapeHtml(cap)}" target="_blank" rel="noopener">
        <img loading="lazy" src="${a.art_full}" alt="${escapeHtml(name)}">
        ${a.new ? `<span class="new-badge">NEW</span>` : ""}
        <span class="a-name">${escapeHtml(name)}${meta ? `<span class="a-meta">${escapeHtml(meta)}</span>` : ""}</span>
        ${cb ? `<button class="a-cb" data-cb="${cb}" type="button" title="open on ceciliabot">↗ cb</button>` : ""}
      </a>`;
    }).join("")}</div>`;

  document.querySelectorAll(".a-cb").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      const url = btn.dataset.cb;
      if (url) window.open(url, "_blank", "noopener");
    });
  });
  document.querySelectorAll("#artiRarity button").forEach(b => b.onclick = () => {
    const r = +b.dataset.r;
    artiRarityF.has(r) ? artiRarityF.delete(r) : artiRarityF.add(r);
    artifacts();
  });
  document.querySelectorAll("#artiRole button").forEach(b => b.onclick = () => {
    const r = b.dataset.role;
    artiRoleF.has(r) ? artiRoleF.delete(r) : artiRoleF.add(r);
    artifacts();
  });
  const qEl = document.getElementById("qArti");
  if (qEl) qEl.oninput = (e) => {
    artiSearchQ = e.target.value;
    artifacts();
    queueMicrotask(() => {
      const n = document.getElementById("qArti");
      if (!n) return;
      n.focus();
      n.setSelectionRange(artiSearchQ.length, artiSearchQ.length);
    });
  };
}

function route() {
  const h = location.hash;
  const isHub = !(h.startsWith("#/u/") || h === "#/updates" || h === "#/emotes" || h === "#/wallpapers" || h === "#/artifacts" || h === "#/about");
  // Release IntersectionObserver references to the previous hub render before
  // any view swaps in — otherwise the detached <img> nodes stay pinned.
  if (!isHub && _hubImgObs) { _hubImgObs.disconnect(); _hubImgObs = null; }
  if (h.startsWith("#/u/")) {
    const rest = decodeURIComponent(h.slice(4));
    const [base, vsuf] = rest.split("/");
    detail(base, vsuf || "");
  } else if (h === "#/updates")    updates();
  else   if (h === "#/emotes")     emotes();
  else   if (h === "#/wallpapers") wallpapers();
  else   if (h === "#/artifacts")  artifacts();
  else   if (h === "#/about")      about();
  else                              hub();
}

window.addEventListener("hashchange", route);
document.querySelectorAll("nav button").forEach(b =>
  b.onclick = () => {

  }
);

// Global lightbox: any <a data-zoom href="..."> opens the asset full-size in
// the modal instead of navigating. We use delegation so it picks up links
// rendered after page-load (gallery, emotes, wallpapers, …) without needing
// per-route wiring. Right-click / middle-click still hit the link's href so
// "open in new tab" keeps working.
const LB        = document.getElementById("lightbox");
const LB_IMG    = document.getElementById("lbImage");
const LB_AUDIO  = document.getElementById("lbAudio");
const LB_DL     = document.getElementById("lbDownload");
const LB_CAP    = document.getElementById("lbCaption");
function openLightbox(src, caption) {
  LB.classList.remove("audio");
  LB_AUDIO.pause(); LB_AUDIO.removeAttribute("src");
  LB_IMG.style.display = "";
  LB_IMG.src = src;
  LB_DL.href = src;
  LB_DL.download = decodeURIComponent(src.split("/").pop() || "asset");
  LB_CAP.textContent = caption || "";
  LB.classList.add("open");
  LB.setAttribute("aria-hidden", "false");
}
function openLightboxAudio(src, caption) {
  LB.classList.add("audio");
  LB_IMG.style.display = "none"; LB_IMG.src = "";
  LB_AUDIO.src = src;
  LB_DL.href = src;
  LB_DL.download = decodeURIComponent(src.split("/").pop() || "clip") ;
  LB_CAP.textContent = caption || "";
  LB.classList.add("open");
  LB.setAttribute("aria-hidden", "false");
  LB_AUDIO.play().catch(() => {}); // autoplay; ignore if blocked
}
function closeLightbox() {
  LB.classList.remove("open", "audio");
  LB.setAttribute("aria-hidden", "true");
  LB_IMG.src = "";
  LB_AUDIO.pause(); LB_AUDIO.removeAttribute("src");
}
document.addEventListener("click", (e) => {
  // Modifier-click / non-primary buttons preserve the native link behaviour.
  if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return;
  // Voice-line clip → audio lightbox.
  const clip = e.target.closest(".vlclip");
  if (clip) {
    const { slug, action, take, label } = clip.dataset;
    const url = `${VOICE_BASE}/${voiceLang}/voc_${slug}_${action}_${take}.ogg`;
    const langLab = (AUDIO_LANGS.find(([k]) => k === voiceLang) || ["", voiceLang])[1];
    openLightboxAudio(url, `${label}${+take > 1 ? " (" + take + ")" : ""} · ${langLab}`);
    return;
  }
  // Voice language toggle → re-render the clip rows for the chosen language.
  const lang = e.target.closest(".vlang");
  if (lang) {
    voiceLang = lang.dataset.lang;
    lang.parentElement.querySelectorAll(".vlang").forEach(b =>
      b.classList.toggle("on", b === lang));
    const box = document.getElementById("voiceClips");
    if (box) {
      const slug = box.dataset.clipslug;
      box.innerHTML = renderVoiceClips(slug, VOICE_CLIPS[slug], voiceLang);
    }
    return;
  }
  const a = e.target.closest("a[data-zoom]");
  if (!a) return;
  e.preventDefault();
  openLightbox(a.getAttribute("href"), a.dataset.cap || "");
});
LB.addEventListener("click", (e) => {
  // Clicks on backdrop close; clicks on the image / audio / download / close don't.
  if (e.target === LB_IMG || e.target === LB_AUDIO ||
      e.target.closest(".lb-download") || e.target.closest(".lb-audio")) return;
  closeLightbox();
});
// Force a real download (not open-in-tab) for any lightbox asset. The native
// `download` attr is ignored cross-origin (e.g. audio/textures on R2), so fetch
// the bytes as a blob and save those. R2 CORS allows GET from the site origin;
// same-origin Pages assets (skill webp, pose, face art) need no CORS. Falls back
// to opening the URL if the fetch is blocked.
document.getElementById("lbDownload").addEventListener("click", async (e) => {
  const src = LB_DL.href;
  if (!src) return;
  e.preventDefault();
  const name = LB_DL.getAttribute("download") || "download";
  try {
    const resp = await fetch(src);
    if (!resp.ok) throw new Error(resp.status);
    const url = URL.createObjectURL(await resp.blob());
    const a = document.createElement("a");
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  } catch (_) {
    window.open(src, "_blank", "noopener");
  }
});
document.getElementById("lbClose").addEventListener("click", closeLightbox);
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && LB.classList.contains("open")) closeLightbox();
});

load();
