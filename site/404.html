<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>E7 Codex — Not Found</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Spline+Sans+Mono:wght@400;500&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0c0d12;--ink-2:#13141d;--line:#2a2c3f;
    --gold:#d8b06a;--gold-dim:#9a824e;--text:#e7e5dd;--mut:#8d8c9c}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(900px 600px at 80% -10%,rgba(216,176,106,.08),transparent 60%),radial-gradient(700px 500px at 0% 100%,rgba(111,214,196,.06),transparent 55%),var(--ink);color:var(--text);font-family:'Outfit',sans-serif;line-height:1.5;min-height:100vh;display:flex;flex-direction:column}
  a{color:inherit;text-decoration:none}
  header{padding:34px 40px 22px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:26px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(23,24,38,.6),transparent)}
  .brand{font-family:'Cormorant Garamond',serif;font-size:34px;letter-spacing:.04em;color:var(--gold);font-weight:600;transition:.2s}
  .brand:hover{color:var(--text)}
  .brand small{display:block;font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.32em;color:var(--mut);text-transform:uppercase;margin-top:2px}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px 80px;gap:18px}
  .code{font-family:'Spline Sans Mono',monospace;font-size:13px;letter-spacing:.4em;color:var(--mut);text-transform:uppercase}
  h1{font-family:'Cormorant Garamond',serif;font-size:64px;color:var(--gold);font-weight:600;letter-spacing:.02em;line-height:1.1}
  .msg{color:var(--mut);font-size:14px;max-width:480px;letter-spacing:.02em}
  .home{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--gold-dim);color:var(--gold);padding:11px 22px;border-radius:3px;font-family:'Spline Sans Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;margin-top:14px;transition:.2s}
  .home:hover{background:rgba(216,176,106,.08);color:var(--text);border-color:var(--gold)}
  @media(max-width:720px){
    header{padding:20px 16px 14px}
    h1{font-size:48px}
  }
</style>
</head>
<body>
<header>
  <a class="brand" href="/">E7 Codex<small>artwork &amp; pose archive</small></a>
</header>
<main>
  <div class="code">404 · not found</div>
  <h1>nothing here</h1>
  <p class="msg">This path doesn't lead anywhere in the codex. Maybe a stale link, or a unit slug that doesn't exist.</p>
  <a class="home" href="/">‹ back to codex</a>
</main>
</body>
</html>
